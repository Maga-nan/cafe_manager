{% extends "base.html" %}
{% block title %}Подтверждение Email{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>📧 Подтверждение Email</h2>
        
        <div style="background: #e8f4f8; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
            <p style="margin: 0; color: #333;">
                🔑 Код отправлен на: <strong>{{ email }}</strong>
            </p>
            <p style="margin: 10px 0 0 0; color: #666; font-size: 0.9rem;">
                💡 Откройте <a href="http://127.0.0.1:5001" target="_blank" style="color: #667eea;">
                    Почту Cafe (порт 5001)
                </a> в новой вкладке, чтобы посмотреть код.
            </p>
        </div>
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>Код подтверждения</label>
                <input type="text" name="code" required placeholder="123456" maxlength="6" 
                       style="text-align: center; font-size: 28px; letter-spacing: 8px; font-weight: bold;">
            </div>
            <button type="submit" class="btn btn-primary">✅ Подтвердить и войти</button>
        </form>
        
        <form method="POST" action="{{ url_for('auth.resend_code') }}" style="margin-top: 15px;">
            <button type="submit" class="btn btn-secondary">📩 Отправить код ещё раз</button>
        </form>
        
        <p class="auth-link" style="margin-top: 20px;">
            <a href="{{ url_for('auth.register') }}">← Назад к регистрации</a>
        </p>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Подтверждение{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>🔑 Подтверждение</h2>
        
        <div style="background: #e8f4fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #2196F3;">
            <p style="margin: 0; font-weight: 600;">📧 Email: {{ email }}</p>
            <p style="margin: 5px 0 0 0; color: #666; font-size: 0.9rem;">
                💡 <strong>Откройте окно кодов</strong> в новой вкладке:
            </p>
            <a href="/admin/codes" target="_blank" 
               style="display: inline-block; margin-top: 8px; padding: 8px 16px; 
                      background: #2196F3; color: white; text-decoration: none; 
                      border-radius: 5px; font-weight: 600;">
                🔑 Открыть окно кодов ↗
            </a>
        </div>
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>Код подтверждения</label>
                <input type="text" name="code" required placeholder="123456" 
                       maxlength="6" pattern="[0-9]{6}"
                       style="text-align: center; font-size: 32px; letter-spacing: 10px; font-weight: bold;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                ✅ Подтвердить и войти
            </button>
        </form>
        
        <form method="POST" action="{{ url_for('auth.resend_code') }}" style="margin-top: 15px;">
            <button type="submit" class="btn btn-secondary" style="width: 100%;">
                🔄 Получить новый код
            </button>
        </form>
        
        <p class="auth-link" style="margin-top: 20px;">
            <a href="{{ url_for('auth.register') }}">← Назад</a>
        </p>
    </div>
</div>

<script>
// Автофокус на поле кода
document.querySelector('input[name="code"]').focus();
</script>
{% endblock %}

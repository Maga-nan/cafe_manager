{% extends "base.html" %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>🔐 Вход в систему</h2>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Логин</label>
                <input type="text" id="username" name="username" required placeholder="Введите логин">
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required placeholder="Введите пароль">
            </div>
            <button type="submit" class="btn btn-primary">Войти</button>
        </form>
        <p class="auth-link">Нет аккаунта? <a href="{{ url_for('auth.register') }}">Зарегистрироваться</a></p>
        <div class="demo-credentials">
            <p><strong>Демо доступ:</strong></p>
            <p>Логин: <code>admin</code></p>
            <p>Пароль: <code>admin123</code></p>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>📝 Регистрация</h2>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" name="username" required placeholder="Придумайте логин">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="example@mail.com">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" required placeholder="Минимум 6 символов">
            </div>
            <div class="form-group">
                <label>Подтверждение пароля</label>
                <input type="password" name="confirm_password" required placeholder="Повторите пароль">
            </div>
            <div class="form-group">
                <label>Роль</label>
                <select name="role">
                    <option value="cashier">Кассир</option>
                    <option value="manager">Менеджер</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
        </form>
        <p class="auth-link">Есть аккаунт? <a href="{{ url_for('auth.login') }}">Войти</a></p>
    </div>
</div>
{% endblock %}

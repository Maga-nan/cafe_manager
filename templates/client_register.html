{% extends "base.html" %}
{% block title %}Регистрация клиента{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>📝 Регистрация</h2>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>Имя пользователя *</label>
                <input type="text" name="username" required placeholder="Придумайте имя" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Email (необязательно)</label>
                <input type="email" name="email" placeholder="example@mail.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Телефон (необязательно)</label>
                <input type="tel" name="phone" placeholder="+7 (999) 000-00-00" autocomplete="tel">
            </div>
            <div class="form-group">
                <label>Пароль *</label>
                <input type="password" name="password" required placeholder="Минимум 4 символа" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>Подтверждение пароля *</label>
                <input type="password" name="confirm_password" required placeholder="Повторите пароль" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
        </form>
        <p class="auth-link">Уже есть аккаунт? <a href="{{ url_for('client.client_login') }}">Войти</a></p>
    </div>
</div>
{% endblock %}
